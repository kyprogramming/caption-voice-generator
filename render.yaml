services:
- type: web
  name: my-auto-caption-app
  env: python
  region: oregon
  plan: starter

  # ── Force Python 3.12 ────────────────────────────────────────────────
  pythonVersion: "3.12"

  # ── Build ────────────────────────────────────────────────────────────
  buildCommand: |
    apt-get update && \
    apt-get install -y --no-install-recommends \
      ffmpeg \
      fonts-noto-core \
      fonts-noto-extra \
      fonts-dejavu-core \
      fonts-mukta \
      fontconfig && \
    fc-cache -fv && \
    pip install --upgrade pip && \
    pip install -r requirements.txt

  # ── Start ────────────────────────────────────────────────────────────
  startCommand: uvicorn main:app --host 0.0.0.0 --port ${PORT:-10000} --workers 2 --timeout-keep-alive 120

  # ── Runtime environment variables ────────────────────────────────────
  envVars:
  - key: ASSEMBLYAI_API_KEY
    sync: false # set manually in Render dashboard → Environment

  - key: PYTHONUNBUFFERED
    value: "1"

  - key: FONTCONFIG_PATH
    value: /etc/fonts

  # ── Health check ─────────────────────────────────────────────────────
  healthCheckPath: /health